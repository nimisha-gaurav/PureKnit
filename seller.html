<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureKnit - Become a Seller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="glow"></div>
    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logonew.png" alt="PureKnit Logo" title="PureKnit | Soft Hosiery Marketplace">
        </a>
        <ul class="nav-links">
            <li><a href="index.html" data-lang="nav_home">Home</a></li>
            <li><a href="products.html" data-lang="nav_products">Products</a></li>
            <li><a href="about.html" data-lang="nav_about">About Us</a></li>
            <li><a href="rewards.html" data-lang="nav_rewards">Rewards</a></li>
            <li><a href="tracking.html" data-lang="nav_tracking">Track Order</a></li>
            <li><a href="cart.html"><span data-lang="nav_cart">Cart</span> <span class="cart-badge">0</span></a></li>
            <li><a href="help.html" data-lang="nav_help">Help</a></li>
            <li><a href="login.html" data-lang="nav_login">Login</a></li>
        </ul>
        <button id="langToggleBtn" class="lang-toggle">EN / HI</button>
    </nav>

    <main class="container auth-layout" style="padding-top: 2rem;">
        <div class="auth-container" style="max-width: 600px;">
            <h2 data-lang="title_seller" style="font-family:'Outfit'; font-size:2.2rem; color:var(--text-heading); margin-bottom:0.5rem; text-align:center;">Become a Verified Seller</h2>
            <p data-lang="seller_desc" style="color:var(--text-muted); text-align:center; margin-bottom:2rem; font-size:1.05rem;">Join India's premium hosiery network and reach thousands of buyers daily.</p>
            
            <form id="seller-form" onsubmit="event.preventDefault(); document.getElementById('seller-success').style.display='block'; this.reset();">
                <div class="form-group">
                    <label data-lang="label_company">Company Name</label>
                    <input type="text" required>
                </div>
                <div class="form-group" style="display:flex; gap:1.5rem; margin-bottom:0;">
                    <div style="flex:1;">
                        <label data-lang="label_name">Full Name</label>
                        <input type="text" required style="margin-bottom:1.5rem;">
                    </div>
                    <div style="flex:1;">
                        <label data-lang="label_phone">Phone Number</label>
                        <input type="tel" required style="margin-bottom:1.5rem;">
                    </div>
                </div>
                <div class="form-group">
                    <label data-lang="label_email">Email Address</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label data-lang="label_gst">GSTIN / VAT Number</label>
                    <input type="text" required>
                </div>
                <div id="seller-success" class="success-msg" style="text-align:center; padding:1rem; font-size:1.05rem;">Application successfully submitted! Our review team will be in contact shortly.</div>
                <button type="submit" class="btn btn-primary" data-lang="btn_apply_seller" style="width:100%; border-radius:12px; padding:1.2rem; font-size:1.1rem; margin-top:2rem;">Submit Application</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
