<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureKnit - Secure Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
            align-items: start;
        }
        @media(max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="glow"></div>
    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logonew.png" alt="PureKnit Logo" title="PureKnit | Soft Hosiery Marketplace">
        </a>
        <ul class="nav-links">
            <li><a href="index.html" data-lang="nav_home">Home</a></li>
            <li><a href="products.html" data-lang="nav_products">Products</a></li>
            <li><a href="cart.html"><span data-lang="nav_cart">Cart</span> <span class="cart-badge">0</span></a></li>
            <li><a href="help.html" data-lang="nav_help">Help</a></li>
            <li><a href="login.html" data-lang="nav_login">Login</a></li>
        </ul>
        <button id="langToggleBtn" class="lang-toggle">EN / HI</button>
    </nav>

    <main class="container" style="padding-top: 2rem; padding-bottom: 5rem;">
        <h1 class="page-title" data-lang="title_checkout" style="text-align:center; margin-bottom:2rem;">Secure Checkout</h1>
        
        <form onsubmit="processCheckout(event)" class="checkout-grid">
            <div class="glass-card" style="padding: 2rem; border-radius: 16px;">
                <h3 data-lang="header_shipping" style="margin-bottom:1.5rem; font-family:'Outfit'; font-size:1.5rem; color:var(--text-heading);">Shipping Information</h3>
                
                <div class="form-group" style="display:flex; gap:1.5rem; margin-bottom:0;">
                    <div style="flex:1;">
                        <label data-lang="label_name">Full Name</label>
                        <input type="text" required style="margin-bottom:1.5rem;">
                    </div>
                    <div style="flex:1;">
                        <label data-lang="label_phone">Phone Number</label>
                        <input type="tel" required style="margin-bottom:1.5rem;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label data-lang="label_address">Street Address</label>
                    <input type="text" required>
                </div>
                
                <div class="form-group" style="display:flex; gap:1rem; margin-bottom:0;">
                    <div style="flex:1;">
                        <label data-lang="label_city">City</label>
                        <input type="text" required style="margin-bottom:1.5rem;">
                    </div>
                    <div style="flex:1;">
                        <label data-lang="label_state">State / Province</label>
                        <input type="text" required style="margin-bottom:1.5rem;">
                    </div>
                    <div style="flex:1;">
                        <label data-lang="label_zip">ZIP / Postal Code</label>
                        <input type="text" required style="margin-bottom:1.5rem;">
                    </div>
                </div>

                <hr style="border:none; border-top:1px solid rgba(74,20,140,0.1); margin: 1rem 0 2rem;">

                <h3 data-lang="header_payment" style="margin-bottom:1.5rem; font-family:'Outfit'; font-size:1.5rem; color:var(--text-heading);">Payment Details</h3>
                <div class="form-group">
                    <label data-lang="label_card">Credit/Debit Card Number</label>
                    <input type="text" placeholder="XXXX-XXXX-XXXX-XXXX" required>
                </div>
                <div class="form-group" style="display:flex; gap:1rem; margin-bottom:0;">
                    <div style="flex:1;">
                        <label data-lang="label_expiry">Expiry Date (MM/YY)</label>
                        <input type="text" placeholder="MM/YY" required>
                    </div>
                    <div style="flex:1;">
                        <label data-lang="label_cvv">CVV Security Code</label>
                        <input type="password" placeholder="123" required>
                    </div>
                </div>
            </div>
            
            <div class="glass-card" style="padding: 2rem; border-radius: 16px; position: sticky; top: 120px;">
                <h3 data-lang="cart_summary" style="margin-bottom:1.5rem; font-family:'Outfit'; font-size:1.5rem; color:var(--text-heading);">Summary</h3>
                
                <div id="checkout-dynamic-summary">
                    <!-- Dynamic Summary Rendered by JS -->
                </div>

                <div style="color:var(--text-muted); margin-bottom:2rem; font-size:0.95rem;">
                    Ensure your shipping information is correct before securely placing your order. 
                    Your payment data is fully encrypted.
                </div>
                
                <div id="checkout-success" class="success-msg" style="text-align:center; padding:1.5rem; font-size:1.1rem; border-radius:12px; margin-bottom:1rem; display:none;" data-lang="msg_order_success">
                    Order Placed Successfully! Thank you.
                </div>
                <button type="submit" class="btn btn-primary" data-lang="btn_place_order" style="width:100%; border-radius:12px; padding:1.2rem; font-size:1.1rem;">Place Order</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
