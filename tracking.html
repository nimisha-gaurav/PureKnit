<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureKnit - Track Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .tracking-result {
            margin-top: 2rem;
            display: none;
            text-align: left;
            animation: fadeIn 0.4s ease forwards;
        }

        .tracking-step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 2rem;
            position: relative;
        }

        .tracking-step:last-child {
            margin-bottom: 0;
        }

        /* The vertical connection line */
        .tracking-step::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 35px;
            bottom: -20px;
            width: 2px;
            background: rgba(74, 20, 140, 0.15);
            z-index: 0;
        }

        .tracking-step:last-child::before {
            display: none;
        }

        /* Highlighting active path */
        .tracking-step.done::before {
            background: var(--accent);
        }

        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid rgba(74, 20, 140, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 1.5rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(74, 20, 140, 0.05);
            font-size: 0.9rem;
        }

        .tracking-step.done .step-icon {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(216, 67, 21, 0.3);
        }

        .step-content h4 {
            font-size: 1.1rem;
            color: var(--text-heading);
            margin-bottom: 0.3rem;
            font-family: 'Outfit';
        }

        .step-content p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0;
        }

        .step-date {
            font-size: 0.85rem;
            color: rgba(126, 87, 194, 0.6);
            margin-top: 0.4rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="glow"></div>
    <canvas id="bg-canvas"></canvas>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="assets/logonew.png" alt="PureKnit Logo" title="PureKnit | Soft Hosiery Marketplace">
        </a>
        <ul class="nav-links">
            <li><a href="index.html" data-lang="nav_home">Home</a></li>
            <li><a href="products.html" data-lang="nav_products">Products</a></li>
            <li><a href="about.html" data-lang="nav_about">About Us</a></li>
            <li><a href="rewards.html" data-lang="nav_rewards">Rewards</a></li>
            <li><a href="tracking.html" data-lang="nav_tracking" class="active">Track Order</a></li>
            <li><a href="cart.html"><span data-lang="nav_cart">Cart</span> <span class="cart-badge">0</span></a></li>
            <li><a href="help.html" data-lang="nav_help">Help</a></li>
            <li><a href="login.html" data-lang="nav_login">Login</a></li>
        </ul>
        <button id="langToggleBtn" class="lang-toggle">EN / HI</button>
    </nav>

    <main class="auth-layout">
        <div class="auth-container" style="max-width: 650px;">
            <div id="tracking-input-view" class="auth-form active text-center" style="text-align: center;">
                <h2 style="margin-bottom: 1rem; font-size: 2.5rem;">Track Your Order</h2>
                <p style="margin-bottom: 2.5rem;">Enter your 10-digit Order ID or Tracking Number to see its real-time shipping status.</p>
                <form id="tracking-form" onsubmit="handleTracking(event)">
                    <div class="form-group">
                        <input type="text" id="order-id" placeholder="e.g. PK-882145" required style="padding: 1.2rem; font-size: 1.1rem; text-align: center; letter-spacing: 2px;">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 12px; padding: 1.2rem; font-size: 1.15rem; margin-top: 1rem;">Track Package</button>
                    <a href="index.html" class="btn btn-outline" style="display:inline-block; width: 100%; border-radius: 12px; padding: 1.2rem; font-size: 1.15rem; margin-top: 1rem;">Return Home</a>
                </form>
            </div>

            <div id="tracking-result-view" class="tracking-result">
                <!-- Javascript Injection -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function handleTracking(e) {
            e.preventDefault();
            const orderId = document.getElementById('order-id').value;
            const resView = document.getElementById('tracking-result-view');
            const inView = document.getElementById('tracking-input-view');
            
            // Just mocked visuals 
            const today = new Date();
            const past1 = new Date(today); past1.setDate(today.getDate() - 3);
            const past2 = new Date(today); past2.setDate(today.getDate() - 1);
            
            resView.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                    <div>
                        <h3 style="font-family:'Outfit'; color:var(--text-heading); font-size: 1.8rem; margin-bottom: 0.3rem;">Shipment Tracker</h3>
                        <p style="color:var(--text-muted); font-weight: 600; font-size: 1.1rem; margin:0;">Order: <span style="color:var(--accent);">${orderId.toUpperCase()}</span></p>
                    </div>
                    <button class="btn btn-outline" style="padding: 0.6rem 1.2rem; font-size: 0.9rem; border-radius: 12px;" onclick="resetTracking()">Search Again</button>
                </div>
                
                <div style="padding-left: 1rem;">
                    <div class="tracking-step done">
                        <div class="step-icon">✓</div>
                        <div class="step-content">
                            <h4>Order Placed</h4>
                            <p>Your order was securely processed.</p>
                            <div class="step-date">${past1.toLocaleDateString()} - 10:45 AM</div>
                        </div>
                    </div>

                    <div class="tracking-step done">
                        <div class="step-icon">✓</div>
                        <div class="step-content">
                            <h4>Dispatched & In Transit</h4>
                            <p>Package left our boutique warehouse and is moving through the shipping network.</p>
                            <div class="step-date">${past2.toLocaleDateString()} - 03:20 PM</div>
                        </div>
                    </div>

                    <div class="tracking-step">
                        <div class="step-icon" style="background:var(--surface);">📍</div>
                        <div class="step-content">
                            <h4>Out for Delivery</h4>
                            <p>Arriving soon at your designated shipping address.</p>
                            <div class="step-date">Estimated: Today</div>
                        </div>
                    </div>

                    <div class="tracking-step" style="margin-bottom: 0;">
                        <div class="step-icon" style="background:var(--surface);">📦</div>
                        <div class="step-content">
                            <h4>Delivered</h4>
                            <p>Enjoy your premium hosiery.</p>
                        </div>
                    </div>
                </div>
            `;
            
            inView.style.display = 'none';
            resView.style.display = 'block';
        }

        function resetTracking() {
            document.getElementById('tracking-result-view').style.display = 'none';
            document.getElementById('tracking-input-view').style.display = 'block';
            document.getElementById('order-id').value = '';
        }
    </script>
</body>
</html>
